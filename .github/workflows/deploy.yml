name: Deploy to Azure Web App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Zip deployment package (source package for Oryx server-side build)
        run: |
          zip -r deploy.zip src/ prisma/ package.json package-lock.json tsconfig.json .deployment swagger.yaml swagger2.yaml || true
          ls -la
          echo "CHECK src/index.ts in ZIP:"
          unzip -l deploy.zip | grep -E 'src/index\.ts$' || true
          echo "CHECK package.json in ZIP:"
          unzip -l deploy.zip | grep -E 'package\.json$' || true
          echo "TOP LEVEL DIRS in ZIP:"
          unzip -l deploy.zip | head -n 30

      - name: Upload deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp-package
          path: deploy.zip
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download deployment artifact
        uses: actions/download-artifact@v4
        with:
          name: webapp-package
          path: .

      - name: Verify downloaded deployment package
        run: |
          echo "CHECK src/index.ts in downloaded ZIP:"
          unzip -l ./deploy.zip | grep -E 'src/index\.ts$' || true
          echo "CHECK package.json in downloaded ZIP:"
          unzip -l ./deploy.zip | grep -E 'package\.json$' || true
          echo "TOP LEVEL DIRS in downloaded ZIP:"
          unzip -l ./deploy.zip | head -n 30

      - name: Check secrets presence
        run: |
          if [ -z "${{ secrets.AZURE_WEBAPP_NAME }}" ]; then echo "AZURE_WEBAPP_NAME is EMPTY" && exit 1; else echo "AZURE_WEBAPP_NAME is set"; fi
          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]; then echo "AZURE_WEBAPP_PUBLISH_PROFILE is EMPTY" && exit 1; else echo "AZURE_WEBAPP_PUBLISH_PROFILE is set"; fi

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./deploy.zip

  smoke:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ vars.RUN_SMOKE == 'true' }}
    env:
      SMOKE_BASE_URL: ${{ vars.SMOKE_BASE_URL }}
      SMOKE_TOKEN: ${{ secrets.SMOKE_TOKEN }}
      SMOKE_CHECK_NOTIFICATIONS: ${{ vars.SMOKE_CHECK_NOTIFICATIONS }}
      SMOKE_CHECK_DRY_RUN: ${{ vars.SMOKE_CHECK_DRY_RUN }}
      SMOKE_TASK_ID: ${{ vars.SMOKE_TASK_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run smoke suite
        run: node scripts/smoke.js


